name: Deploy Backend to NCP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - chore/#266-blue-green
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
      - "deploy/**"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env file
        working-directory: ./deploy
        run: |
          cp ~/deploy/.env ./.env

          if [ ! -f .env ]; then
            echo ".env file not exists"
            exit 1
          fi 

          echo ".env file copied."

      - name: Blue-Green Release (Compose + Nginx Switch)
        working-directory: ./deploy
        run: |
          chmod +x ./deploy.sh 
          ./deploy.sh

      - name: Show container logs
        working-directory: ./deploy
        if: always()
        run: |
          docker compose logs --tail=50
