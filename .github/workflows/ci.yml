name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      client-toss: ${{ steps.filter.outputs.client-toss }}
      server-toss: ${{ steps.filter.outputs.server-toss }}
      packages-shared: ${{ steps.filter.outputs.packages-shared }}
      packages-similarity: ${{ steps.filter.outputs.packages-similarity }}
      packages-toss-shared: ${{ steps.filter.outputs.packages-toss-shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            client-toss:
              - 'client-toss/**'
            server-toss:
              - 'server-toss/**'
            packages-shared:
              - 'packages/shared/**'
            packages-similarity:
              - 'packages/similarity/**'
            packages-toss-shared:
              - 'packages/toss-shared/**'

  client:
    name: Client
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.client == 'true' ||
      needs.changes.outputs.packages-shared == 'true' ||
      needs.changes.outputs.packages-similarity == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Security Audit
        working-directory: client
        id: client-audit
        run: |
          pnpm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          echo "audit_result<<EOF" >> $GITHUB_OUTPUT
          cat audit-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Lint
        working-directory: client
        run: pnpm run lint

      - name: Format Check
        working-directory: client
        run: pnpm run format:check

      - name: Test with Coverage
        working-directory: client
        run: pnpm run test:coverage

      - name: Coverage Report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: client
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

      - name: Build
        working-directory: client
        run: pnpm run build

  server:
    name: Server
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.server == 'true' ||
      needs.changes.outputs.packages-shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Security Audit
        working-directory: server
        id: server-audit
        run: |
          pnpm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          echo "audit_result<<EOF" >> $GITHUB_OUTPUT
          cat audit-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Lint
        working-directory: server
        run: pnpm run lint

      - name: Format Check
        working-directory: server
        run: pnpm run format:check

      - name: Server Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: server
          package-manager: pnpm
          test-script: pnpm run test:cov

      - name: Build
        working-directory: server
        run: pnpm run build

  client-toss:
    name: Client-Toss
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.client-toss == 'true' ||
      needs.changes.outputs.packages-toss-shared == 'true' ||
      needs.changes.outputs.packages-similarity == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Lint
        working-directory: client-toss
        run: pnpm run lint

      - name: Format Check
        working-directory: client-toss
        run: pnpm run format:check

      - name: Test with Coverage
        working-directory: client-toss
        run: pnpm run test:coverage

      - name: Coverage Report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: client-toss
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json
          name: client-toss

      - name: QA Check
        working-directory: client-toss
        run: pnpm run qa:ci

      - name: Build
        working-directory: client-toss
        run: pnpm run build

  server-toss:
    name: Server-Toss
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.server-toss == 'true' ||
      needs.changes.outputs.packages-toss-shared == 'true' ||
      needs.changes.outputs.packages-similarity == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Lint
        working-directory: server-toss
        run: pnpm run lint

      - name: Format Check
        working-directory: server-toss
        run: pnpm run format:check

      - name: Test with Coverage
        working-directory: server-toss
        run: pnpm run test:cov

      - name: Build
        working-directory: server-toss
        run: pnpm run build

  bundle-size-client:
    name: Bundle Size Check (Client)
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.client == 'true' || needs.changes.outputs.packages-shared == 'true' || needs.changes.outputs.packages-similarity == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Bundle Size Check
        uses: preactjs/compressed-size-action@v2
        continue-on-error: true
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          build-script: "build"
          cwd: "./client"

  bundle-size-toss:
    name: Bundle Size Check (Toss)
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.client-toss == 'true' || needs.changes.outputs.packages-toss-shared == 'true' || needs.changes.outputs.packages-similarity == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Bundle Size Check
        uses: preactjs/compressed-size-action@v2
        continue-on-error: true
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          build-script: "build"
          cwd: "./client-toss"

  notify:
    name: Slack Notification
    needs:
      [
        changes,
        client,
        server,
        client-toss,
        server-toss,
        bundle-size-client,
        bundle-size-toss,
      ]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: |
            ${{
              (needs.client.result == 'success' || needs.client.result == 'skipped') &&
              (needs.server.result == 'success' || needs.server.result == 'skipped') &&
              (needs.client-toss.result == 'success' || needs.client-toss.result == 'skipped') &&
              (needs.server-toss.result == 'success' || needs.server-toss.result == 'skipped') &&
              (needs.bundle-size-client.result == 'success' || needs.bundle-size-client.result == 'skipped') &&
              (needs.bundle-size-toss.result == 'success' || needs.bundle-size-toss.result == 'skipped') &&
              'success' || 'failure'
            }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          mention: "here"
          if_mention: failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  security-audit:
    name: Security Audit Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Client Security Audit
        id: client-audit
        working-directory: client
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat audit-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Server Security Audit
        id: server-audit
        working-directory: server
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat audit-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Security Audit Report
        uses: actions/github-script@v8
        env:
          CLIENT_AUDIT: ${{ steps.client-audit.outputs.result }}
          SERVER_AUDIT: ${{ steps.server-audit.outputs.result }}
        with:
          script: |
            const clientOutput = process.env.CLIENT_AUDIT || '';
            const serverOutput = process.env.SERVER_AUDIT || '';

            const clientIcon = clientOutput.includes('0 vulnerabilities') ? '✅' : '⚠️';
            const serverIcon = serverOutput.includes('0 vulnerabilities') ? '✅' : '⚠️';

            const escapeMarkdown = (str) => str.slice(0, 2000).replace(/`/g, '\\`').replace(/\$/g, '\\$');

            const body = `## 🔒 Security Audit Report

            ### ${clientIcon} Client
            \`\`\`
            ${escapeMarkdown(clientOutput)}
            \`\`\`

            ### ${serverIcon} Server
            \`\`\`
            ${escapeMarkdown(serverOutput)}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
