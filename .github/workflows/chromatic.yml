name: 'Chromatic'

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'client/src/**'
      - 'client/.storybook/**'
      - 'client/package.json'

  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build shared package
        run: npx tsc
        working-directory: ./packages/shared

      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          workingDir: ./client
          onlyChanged: true

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: chromatic
          skip_unchanged: true
          message: |
            ## 🎨 Chromatic 리뷰

            | 항목 | 링크 |
            |------|------|
            | 👀 UI 변경사항 리뷰 | ${{ steps.chromatic.outputs.buildUrl }} |
            | 📖 Storybook | ${{ steps.chromatic.outputs.storybookUrl }} |

            변경된 스토리: ${{ steps.chromatic.outputs.changeCount }}개 • 총 컴포넌트: ${{ steps.chromatic.outputs.componentCount }}개