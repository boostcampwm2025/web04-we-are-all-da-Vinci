name: daVinci-toss-deploy

services:
  app:
    image: ${IMAGE_TAG}
    container_name: daVinci-toss-server
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ~/deploy/certs/davinci_private.key:/run/certs/davinci_private.key:ro
      - ~/deploy/certs/davinci_public.cert:/run/certs/davinci_public.cert:ro
    environment:
      - TOSS_CLIENT_CERT_PATH=/run/certs/davinci_private.key
      - TOSS_CLIENT_KEY_PATH=/run/certs/davinci_public.cert
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migration:
    image: ${IMAGE_TAG}
    env_file:
      - .env
    command:
      [
        "pnpm",
        "run",
        "migration:up",
        "--config",
        "mikro-orm.migration.config.cjs",
      ]
